<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Leben in Deutschland — Тренажёр лексики</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#e9e7e0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Leben in DE">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#e9e7e0;
  --paper-raised:#f4f3ee;
  --paper-sunk:#e2e0d8;
  --ink:#17161a;
  --ink-soft:#54524c;
  --ink-faint:#8b897f;
  --gold:#d99a06;
  --gold-deep:#b07d05;
  --red:#bf2833;
  --black-band:#141414;
  --line:#d2d0c6;
  --line-strong:#c3c1b6;
  --good:#2f7d4f;
  --shadow:0 1px 2px rgba(20,18,16,.05), 0 12px 30px -14px rgba(20,18,16,.28);
  --shadow-sm:0 1px 2px rgba(20,18,16,.06), 0 4px 10px -6px rgba(20,18,16,.18);
  --r:12px;
  --sans:"IBM Plex Sans", system-ui, sans-serif;
  --disp:"Archivo", "IBM Plex Sans", system-ui, sans-serif;
  --mono:"IBM Plex Mono", ui-monospace, monospace;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--sans);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  padding-bottom:env(safe-area-inset-bottom);
}
.flagline{height:4px;width:100%;
  background:linear-gradient(90deg,var(--black-band) 0 33.33%,var(--red) 33.33% 66.66%,var(--gold) 66.66% 100%);}
.wrap{max-width:920px;margin:0 auto;padding:0 20px}

/* ---------- header ---------- */
.topbar{padding:22px 0 18px;border-bottom:1px solid var(--line)}
.topbar-in{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:13px;flex:1 1 260px;min-width:0}
.mark{flex:0 0 auto;width:34px;height:34px;border-radius:7px;overflow:hidden;
  box-shadow:0 0 0 1px var(--line-strong);display:block}
.title h1{font-family:var(--disp);font-weight:800;font-size:clamp(1.15rem,3.4vw,1.7rem);
  letter-spacing:.14em;text-transform:uppercase;margin:0;line-height:1.02}
.title p{margin:3px 0 0;font-size:.82rem;color:var(--ink-soft);letter-spacing:.01em}
.head-tools{display:flex;align-items:center;gap:14px;flex:0 0 auto;margin-left:auto}
.lang{display:inline-flex;border:1px solid var(--line-strong);border-radius:999px;overflow:hidden;background:var(--paper-raised)}
.lang button{font-family:var(--mono);font-size:.78rem;font-weight:600;letter-spacing:.06em;
  border:0;background:transparent;color:var(--ink-faint);padding:6px 13px;cursor:pointer;transition:all .15s}
.lang button[aria-pressed="true"]{background:var(--ink);color:var(--paper-raised)}
.progress-box{min-width:150px}
.progress-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;
  font-family:var(--mono);font-size:.74rem;color:var(--ink-soft);letter-spacing:.02em}
.progress-top b{color:var(--ink);font-weight:600}
.bar{height:6px;margin-top:6px;background:var(--paper-sunk);border-radius:999px;overflow:hidden;box-shadow:inset 0 0 0 1px var(--line)}
.bar>span{display:block;height:100%;width:0;border-radius:999px;
  background:linear-gradient(90deg,var(--gold),var(--gold-deep));transition:width .45s cubic-bezier(.2,.7,.2,1)}
.reset{background:none;border:0;color:var(--ink-faint);font-family:var(--sans);font-size:.76rem;
  cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:2px 0}
.reset:hover{color:var(--red)}

/* ---------- mode switch ---------- */
.modes{display:flex;gap:2px;margin:18px 0 0;background:var(--paper-sunk);
  padding:3px;border-radius:11px;box-shadow:inset 0 0 0 1px var(--line);max-width:100%;
  overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.modes::-webkit-scrollbar{display:none}
.modes button{font-family:var(--disp);font-weight:700;font-size:.86rem;letter-spacing:.04em;white-space:nowrap;flex:0 0 auto;
  border:0;background:transparent;color:var(--ink-soft);padding:9px 18px;border-radius:8px;cursor:pointer;transition:all .18s}
.modes button:hover{color:var(--ink)}
.modes button[aria-selected="true"]{background:var(--paper-raised);color:var(--ink);box-shadow:var(--shadow-sm)}

/* ---------- filters ---------- */
.filters{display:flex;gap:8px;overflow-x:auto;padding:16px 0 4px;margin:0 -20px;
  padding-left:20px;padding-right:20px;scrollbar-width:thin;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{height:6px}
.filters::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:3px}
.chip{flex:0 0 auto;font-family:var(--sans);font-size:.82rem;font-weight:500;color:var(--ink-soft);
  background:var(--paper-raised);border:1px solid var(--line);border-radius:999px;
  padding:7px 14px;cursor:pointer;white-space:nowrap;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.chip:hover{border-color:var(--line-strong);color:var(--ink)}
.chip[aria-pressed="true"]{background:var(--ink);color:var(--paper-raised);border-color:var(--ink)}
.chip .n{font-family:var(--mono);font-size:.72rem;opacity:.7}
.chip.core .star{color:var(--gold)}
.chip.core[aria-pressed="true"] .star{color:var(--gold)}

main{padding:22px 0 60px;min-height:52vh}
[hidden]{display:none !important}

/* ---------- cards ---------- */
.card-tools{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:18px}
.toggle{font-family:var(--sans);font-size:.8rem;color:var(--ink-soft);background:var(--paper-raised);
  border:1px solid var(--line);border-radius:999px;padding:6px 13px;cursor:pointer;transition:all .15s;
  display:inline-flex;align-items:center;gap:8px}
.toggle:hover{border-color:var(--line-strong);color:var(--ink)}
.toggle[aria-pressed="true"]{background:var(--paper-sunk);border-color:var(--line-strong);color:var(--ink)}
.toggle .dot{width:7px;height:7px;border-radius:50%;background:var(--line-strong)}
.toggle[aria-pressed="true"] .dot{background:var(--gold)}

.card-shell{perspective:1800px;margin:0 auto;max-width:560px}
.card{position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.2,.72,.2,1);
  min-height:clamp(330px,50vh,440px);cursor:pointer;border-radius:var(--r)}
.card.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;
  padding:26px 30px 22px 38px}
.face.back{transform:rotateY(180deg)}
.spine{position:absolute;left:0;top:0;bottom:0;width:9px;
  background:linear-gradient(180deg,var(--black-band) 0 33.33%,var(--red) 33.33% 66.66%,var(--gold) 66.66% 100%)}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.eyebrow{font-family:var(--mono);font-size:.68rem;font-weight:500;letter-spacing:.13em;
  text-transform:uppercase;color:var(--ink-faint);line-height:1.35}
.tag-core{font-family:var(--mono);font-size:.63rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--gold-deep);border:1px solid var(--gold);border-radius:5px;padding:2px 7px;white-space:nowrap}
.card-body{flex:1;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
  gap:14px;padding:10px 0}
.term{font-family:var(--disp);font-weight:800;color:var(--ink);line-height:1.06;letter-spacing:-.01em;
  font-size:clamp(1.9rem,6vw,3rem)}
.term.long{font-size:clamp(1.5rem,4.6vw,2.2rem)}
.term.xlong{font-size:clamp(1.2rem,3.6vw,1.7rem)}
.answer{font-family:var(--sans);font-weight:600;color:var(--ink);line-height:1.18;
  font-size:clamp(1.5rem,4.6vw,2.15rem)}
.answer.long{font-size:clamp(1.2rem,3.6vw,1.6rem)}
.alt{font-family:var(--sans);font-size:.95rem;color:var(--ink-soft)}
.alt .lbl{font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-right:7px}
.note{margin-top:2px;font-family:var(--mono);font-size:.78rem;line-height:1.45;color:var(--ink-soft);
  border-left:2px solid var(--gold);padding:4px 0 4px 11px;background:linear-gradient(90deg,rgba(217,154,6,.07),transparent)}
.face-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:20px}
.hint{font-family:var(--sans);font-size:.8rem;color:var(--ink-faint);display:inline-flex;align-items:center;gap:7px}
.flipmark{font-family:var(--mono);font-size:.68rem;color:var(--ink-faint);letter-spacing:.08em}

.controls{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:22px;flex-wrap:wrap}
.nav-btn{font-family:var(--sans);font-size:1.1rem;color:var(--ink-soft);background:var(--paper-raised);
  border:1px solid var(--line);width:44px;height:44px;border-radius:11px;cursor:pointer;transition:all .15s;
  display:inline-flex;align-items:center;justify-content:center}
.nav-btn:hover{border-color:var(--line-strong);color:var(--ink)}
.judge{font-family:var(--disp);font-weight:700;font-size:.9rem;letter-spacing:.02em;border-radius:11px;
  padding:0 20px;height:44px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:8px;border:1px solid}
.judge.no{background:var(--paper-raised);border-color:var(--line-strong);color:var(--red)}
.judge.no:hover{background:var(--red);border-color:var(--red);color:#fff}
.judge.yes{background:var(--paper-raised);border-color:var(--gold);color:var(--gold-deep)}
.judge.yes:hover{background:var(--gold);border-color:var(--gold);color:#221a02}
.counter{font-family:var(--mono);font-size:.82rem;color:var(--ink-soft);letter-spacing:.03em}
.dots{display:flex;gap:5px;justify-content:center;margin-top:16px;flex-wrap:wrap;max-width:420px;margin-left:auto;margin-right:auto}
.dots i{width:7px;height:7px;border-radius:50%;background:var(--line-strong);transition:all .2s}
.dots i.on{background:var(--gold)}
.dots i.cur{transform:scale(1.5);background:var(--ink);box-shadow:0 0 0 2px var(--paper)}
.kbd-hint{text-align:center;margin-top:18px;font-family:var(--mono);font-size:.72rem;color:var(--ink-faint);letter-spacing:.02em}
.kbd-hint kbd{background:var(--paper-raised);border:1px solid var(--line);border-bottom-width:2px;border-radius:4px;padding:1px 6px;font-size:.7rem}

/* ---------- empty state ---------- */
.empty{max-width:440px;margin:30px auto;text-align:center;background:var(--paper-raised);
  border:1px solid var(--line);border-radius:var(--r);padding:40px 30px;box-shadow:var(--shadow-sm)}
.empty .big{font-family:var(--disp);font-weight:800;font-size:1.4rem;margin-bottom:8px}
.empty p{color:var(--ink-soft);font-size:.92rem;margin:0 0 18px}
.btn-primary{font-family:var(--disp);font-weight:700;font-size:.86rem;background:var(--ink);color:var(--paper-raised);
  border:0;border-radius:10px;padding:11px 20px;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.86}

/* ---------- quiz ---------- */
.quiz{max-width:560px;margin:0 auto}
.quiz-card{background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);padding:26px 28px 24px 34px;position:relative;overflow:hidden}
.quiz-prompt{margin:14px 0 6px}
.quiz-ask{font-family:var(--sans);font-size:.82rem;color:var(--ink-faint);margin-bottom:8px}
.quiz-term{font-family:var(--disp);font-weight:800;font-size:clamp(1.7rem,5.2vw,2.6rem);line-height:1.08;letter-spacing:-.01em}
.quiz-term.long{font-size:clamp(1.35rem,4vw,1.9rem)}
.options{display:flex;flex-direction:column;gap:10px;margin-top:22px}
.opt{font-family:var(--sans);font-size:1.02rem;color:var(--ink);text-align:left;background:var(--paper);
  border:1px solid var(--line-strong);border-radius:10px;padding:13px 16px;cursor:pointer;transition:all .14s;
  display:flex;align-items:center;justify-content:space-between;gap:12px}
.opt:hover:not(:disabled){border-color:var(--ink);background:var(--paper-raised)}
.opt:disabled{cursor:default}
.opt .ic{font-family:var(--mono);font-weight:600;opacity:0;transition:opacity .15s}
.opt.correct{border-color:var(--good);background:rgba(47,125,79,.09);color:var(--good)}
.opt.correct .ic{opacity:1;color:var(--good)}
.opt.wrong{border-color:var(--red);background:rgba(191,40,51,.08);color:var(--red)}
.opt.wrong .ic{opacity:1;color:var(--red)}
.opt.dim{opacity:.5}
.quiz-foot{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:22px;flex-wrap:wrap}
.score{font-family:var(--mono);font-size:.8rem;color:var(--ink-soft);letter-spacing:.02em;display:flex;gap:16px;flex-wrap:wrap}
.score b{color:var(--ink);font-weight:600}
.score .streak{color:var(--gold-deep)}

/* ---------- list ---------- */
.list-tools{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.search{flex:1 1 240px;position:relative}
.search input{width:100%;font-family:var(--sans);font-size:.95rem;color:var(--ink);
  background:var(--paper-raised);border:1px solid var(--line-strong);border-radius:10px;
  padding:11px 14px 11px 38px}
.search input::placeholder{color:var(--ink-faint)}
.search input:focus{outline:none;border-color:var(--ink)}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-faint)}
.list-count{font-family:var(--mono);font-size:.76rem;color:var(--ink-faint);letter-spacing:.02em}

.group{margin-bottom:26px}
.group-head{display:flex;align-items:baseline;gap:10px;padding:0 0 8px;border-bottom:2px solid var(--ink);margin-bottom:2px}
.group-head h3{font-family:var(--disp);font-weight:700;font-size:1rem;letter-spacing:.02em;margin:0}
.group-head .gn{font-family:var(--mono);font-size:.72rem;color:var(--ink-faint)}
.row{display:grid;grid-template-columns:1.1fr 1fr auto;gap:14px;align-items:baseline;
  padding:11px 4px;border-bottom:1px solid var(--line)}
.row .de{font-family:var(--disp);font-weight:600;font-size:1.02rem;color:var(--ink);display:flex;align-items:baseline;gap:8px}
.row .de .cstar{color:var(--gold);font-size:.7rem}
.row .tr{font-family:var(--sans);font-size:.95rem;color:var(--ink-soft)}
.row .rn{font-family:var(--mono);font-size:.72rem;color:var(--ink-faint);text-align:right;line-height:1.4}
.row.hide .tr{filter:blur(5px);cursor:pointer;transition:filter .15s;color:var(--ink);user-select:none}
.row.hide .tr.revealed{filter:none}
.no-results{text-align:center;color:var(--ink-faint);padding:40px 0;font-size:.95rem}

footer{border-top:1px solid var(--line);padding:20px 0 34px;color:var(--ink-faint);font-size:.76rem;text-align:center;line-height:1.6}
footer b{color:var(--ink-soft);font-weight:600}

:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}

@media (max-width:560px){
  .topbar{padding:14px 0 11px}
  .modes{margin-top:12px}
  .filters{padding-top:12px;padding-bottom:2px}
  main{padding:14px 0 44px;min-height:0}
  .face{padding:20px 20px 16px 28px}
  .card{min-height:clamp(200px,38svh,320px)}
  .card-tools{margin-bottom:12px}
  .controls{margin-top:14px;gap:8px}
  .counter{margin-top:10px}
  .dots{display:none}
  .quiz-card{padding:20px 18px 18px 26px}
  .options{margin-top:16px}
  .opt{padding:12px 14px}
  .row{grid-template-columns:1fr;gap:3px;padding:12px 4px}
  .row .rn{text-align:left}
  .head-tools{width:100%;margin-left:0;justify-content:space-between}
  .progress-box{flex:1;min-width:0}
  .kbd-hint{display:none}
  .srs-card{min-height:clamp(160px,26svh,240px)}
}
@media (prefers-reduced-motion:reduce){
  .card{transition:none}
  .card.flipped{transform:none}
  .face{backface-visibility:visible;-webkit-backface-visibility:visible}
  .face.back{transform:none;display:none}
  .card.flipped .face.front{display:none}
  .card.flipped .face.back{display:flex}
  *{scroll-behavior:auto !important}
}
/* ---------- examples + RU reveal ---------- */
.example{margin-top:2px;border-left:2px solid var(--ink);padding:6px 0 6px 12px;background:linear-gradient(90deg,rgba(23,22,26,.05),transparent);display:flex;flex-direction:column;gap:3px}
.ex-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint)}
.ex-de{font-family:var(--sans);font-weight:600;font-size:.98rem;color:var(--ink);line-height:1.35}
.ex-en{font-family:var(--sans);font-size:.85rem;color:var(--ink-soft);line-height:1.35}
.reveal-ru{align-self:flex-start;margin-top:2px;font-family:var(--sans);font-size:.82rem;color:var(--ink-soft);background:var(--paper);border:1px solid var(--line-strong);border-radius:8px;padding:6px 12px;cursor:pointer;transition:all .14s}
.reveal-ru:hover{border-color:var(--ink);color:var(--ink)}
.ru-line{font-family:var(--sans);font-size:1rem;color:var(--ink)}
.ru-line[hidden]{display:none}
.ru-line .lbl{font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-right:7px}
.face.back .card-body{justify-content:flex-start;overflow-y:auto;gap:10px;padding-top:2px}

/* ---------- SRS / закрепление ---------- */
.srs{max-width:560px;margin:0 auto}
.srs-intro{font-size:.82rem;color:var(--ink-soft);text-align:center;margin:0 auto 16px;max-width:470px;line-height:1.5}
.srs-stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.stat{flex:0 0 auto;background:var(--paper-raised);border:1px solid var(--line);border-radius:10px;padding:8px 13px;text-align:center;min-width:78px}
.stat b{display:block;font-family:var(--mono);font-size:1.15rem;font-weight:600;line-height:1.1;color:var(--ink)}
.stat span{font-size:.68rem;color:var(--ink-faint);letter-spacing:.02em}
.stat.due b{color:var(--gold-deep)}
.mbar{height:8px;border-radius:999px;overflow:hidden;display:flex;background:var(--paper-sunk);box-shadow:inset 0 0 0 1px var(--line);margin-bottom:12px}
.mbar i{height:100%;transition:width .4s}
.mbar-legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin:0 0 22px;font-family:var(--mono);font-size:.68rem;color:var(--ink-faint)}
.mbar-legend span{display:inline-flex;align-items:center;gap:5px}
.mbar-legend i{width:9px;height:9px;border-radius:2px;display:inline-block}
.srs-card{background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
  padding:24px 28px 22px 34px;position:relative;overflow:hidden;min-height:clamp(230px,34vh,310px);display:flex;flex-direction:column;cursor:pointer}
.srs-term{font-family:var(--disp);font-weight:800;font-size:clamp(1.7rem,5.4vw,2.7rem);line-height:1.08;letter-spacing:-.01em;margin:auto 0}
.srs-term.long{font-size:clamp(1.35rem,4vw,1.9rem)}
.srs-term.xlong{font-size:clamp(1.1rem,3.4vw,1.55rem)}
.srs-reveal-hint{font-size:.8rem;color:var(--ink-faint);margin-top:auto;display:inline-flex;align-items:center;gap:7px}
.srs-answer{margin-top:14px;padding-top:16px;border-top:1px solid var(--line)}
.srs-tr{font-family:var(--sans);font-weight:600;font-size:clamp(1.3rem,4vw,1.8rem);color:var(--ink);line-height:1.2}
.srs-alt{font-family:var(--sans);font-size:.92rem;color:var(--ink-soft);margin-top:8px}
.srs-alt .lbl{font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-right:7px}
.srs-note{margin-top:10px;font-family:var(--mono);font-size:.78rem;line-height:1.45;color:var(--ink-soft);border-left:2px solid var(--gold);padding:4px 0 4px 11px;background:linear-gradient(90deg,rgba(217,154,6,.07),transparent)}
.grades{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px}

}

e equal rights in Germany."}, {"c": "Права, свободы, обязанности", "de": "die Meinungsfreiheit", "ru": "свобода мнения", "en": "freedom of opinion", "core": true, "note": "", "exde": "In Deutschland dürfen Menschen offen etwas gegen die Regierung sagen, weil hier Meinungsfreiheit gilt.", "exen": "In Germany people may openly say something against the government, because freedom of opinion applies here."}, {"c": "Права, свободы, обязанности", "de": "die Pressefreiheit", "ru": "свобода прессы", "en": "freedom of the press", "core": false, "note": "", "exde": "Dank der Pressefreiheit dürfen Journalisten frei berichten.", "exen": "Thanks to freedom of the press, journalists may report freely."}, {"c": "Права, свободы, обязанности", "de": "die Religionsfreiheit", "ru": "свобода вероисповедания", "en": "freedom of religion", "core": true, "note": "", "exde": "Die Religionsfreiheit erlaubt jedem, seinen Glauben frei zu leben.", "exen": "Freedom of religion allows everyone to practise their faith freely."}, {"c": "Права, свободы, обязанности", "de": "die Versammlungsfreiheit", "ru": "свобода собраний", "en": "freedom of assembly", "core": false, "note": "", "exde": "Die Versammlungsfreiheit erlaubt es, sich zu einer Demonstration zu treffen.", "exen": "Freedom of assembly allows people to gather for a demonstration."}, {"c": "Права, свободы, обязанности", "de": "die Berufsfreiheit", "ru": "свобода выбора профессии", "en": "freedom to choose an occupation", "core": false, "note": "", "exde": "Die Berufsfreiheit bedeutet, dass man seinen Beruf frei wählen darf.", "exen": "Freedom of occupation means you may freely choose your profession."}, {"c": "Права, свободы, обязанности", "de": "die Freizügigkeit", "ru": "свобода передвижения", "en": "freedom of movement", "core": false, "note": "", "exde": "Wegen der Freizügigkeit darf man in Deutschland überall wohnen und arbeiten.", "exen": "Because of freedom of movement, you may live and work anywhere in Germany."}, {"c": "Права, свободы, обязанности", "de": "die Gleichheit vor dem Gesetz", "ru": "равенство перед законом", "en": "equality before the law", "core": false, "note": "", "exde": "Die Gleichheit vor dem Gesetz gilt für jede Person gleich.", "exen": "Equality before the law applies equally to every person."}, {"c": "Права, свободы, обязанности", "de": "die Diskriminierung", "ru": "дискриминация", "en": "discrimination", "core": false, "note": "", "exde": "Diskriminierung wegen der Herkunft oder Religion ist verboten.", "exen": "Discrimination based on origin or religion is forbidden."}, {"c": "Права, свободы, обязанности", "de": "verbieten", "ru": "запрещать", "en": "to prohibit", "core": false, "note": "", "exde": "Das Grundgesetz verbietet die Diskriminierung von Menschen.", "exen": "The Basic Law prohibits the discrimination of people."}, {"c": "Права, свободы, обязанности", "de": "erlaubt sein", "ru": "быть разрешённым", "en": "to be allowed", "core": false, "note": "", "exde": "In Deutschland ist es erlaubt, seine Meinung frei zu sagen.", "exen": "In Germany it is allowed to say your opinion freely."}, {"c": "Права, свободы, обязанности", "de": "verboten sein", "ru": "быть запрещённым", "en": "to be forbidden", "core": false, "note": "", "exde": "Gewalt gegen andere Menschen ist verboten.", "exen": "Violence against other people is forbidden."}, {"c": "Права, свободы, обязанности", "de": "schützen", "ru": "защищать", "en": "to protect", "core": false, "note": "", "exde": "Der Staat muss die Grundrechte der Menschen schützen.", "exen": "The state must protect people’s basic rights."}, {"c": "Права, свободы, обязанности", "de": "der Schutz", "ru": "защита", "en": "protection", "core": false, "note": "", "exde": "Kinder haben in Deutschland einen besonderen Schutz.", "exen": "Children have special protection in Germany."}, {"c": "Права, свободы, обязанности", "de": "die Strafe", "ru": "наказание", "en": "punishment", "core": false, "note": "", "exde": "Wer ein Gesetz bricht, muss mit einer Strafe rechnen.", "exen": "Whoever breaks a law must expect a punishment."}, {"c": "Права, свободы, обязанности", "de": "strafbar", "ru": "уголовно наказуемый", "en": "punishable by law", "core": false, "note": "", "exde": "Diebstahl ist in Deutschland strafbar.", "exen": "Theft is punishable by law in Germany."}, {"c": "Права, свободы, обязанности", "de": "die Verantwortung", "ru": "ответственность", "en": "responsibility", "core": true, "note": "", "exde": "Eltern tragen die Verantwortung für ihre Kinder.", "exen": "Parents bear the responsibility for their children."}, {"c": "Права, свободы, обязанности", "de": "verantwortlich", "ru": "ответственный", "en": "responsible", "core": false, "note": "", "exde": "Die Regierung ist dem Parlament gegenüber verantwortlich.", "exen": "The government is responsible to the parliament."}, {"c": "Суд, закон, полиция", "de": "das Gericht", "ru": "суд", "en": "court", "core": true, "note": "", "exde": "Ein Streit kann vor einem Gericht entschieden werden.", "exen": "A dispute can be decided before a court."}, {"c": "Суд, закон, полиция", "de": "der Richter / die Richterin", "ru": "судья", "en": "judge", "core": false, "note": "", "exde": "Ein Richter muss unabhängig und neutral entscheiden.", "exen": "A judge must decide independently and neutrally."}, {"c": "Суд, закон, полиция", "de": "der Anwalt / die Anwältin", "ru": "адвокат", "en": "lawyer", "core": false, "note": "", "exde": "Vor Gericht kann man sich von einem Anwalt vertreten lassen.", "exen": "In court you can be represented by a lawyer."}, {"c": "Суд, закон, полиция", "de": "die Polizei", "ru": "полиция", "en": "police", "core": false, "note": "", "exde": "Die Polizei sorgt für Sicherheit und Ordnung.", "exen": "The police ensure safety and order."}, {"c": "Суд, закон, полиция", "de": "die Bundeswehr", "ru": "армия Германии, Бундесвер", "en": "German armed forces", "core": false, "note": "", "exde": "Die Bundeswehr ist die Armee der Bundesrepublik Deutschland.", "exen": "The Bundeswehr is the army of the Federal Republic of Germany."}, {"c": "Суд, закон, полиция", "de": "die Klage", "ru": "иск, жалоба", "en": "lawsuit, complaint", "core": false, "note": "", "exde": "Er hat eine Klage gegen seinen Arbeitgeber eingereicht.", "exen": "He filed a lawsuit against his employer."}, {"c": "Суд, закон, полиция", "de": "verklagen", "ru": "подать в суд", "en": "to sue", "core": false, "note": "", "exde": "Man kann eine Firma vor Gericht verklagen.", "exen": "You can sue a company in court."}, {"c": "Суд, закон, полиция", "de": "die Entscheidung", "ru": "решение", "en": "decision", "core": false, "note": "", "exde": "Die Entscheidung des Gerichts ist für alle bindend.", "exen": "The court’s decision is binding for everyone."}, {"c": "Суд, закон, полиция", "de": "entscheiden", "ru": "решать", "en": "to decide", "core": false, "note": "", "exde": "Ein unabhängiges Gericht entscheidet über den Fall.", "exen": "An independent court decides on the case."}, {"c": "Суд, закон, полиция", "de": "unabhängig", "ru": "независимый", "en": "independent", "core": false, "note": "", "exde": "Die Gerichte in Deutschland sind unabhängig.", "exen": "The courts in Germany are independent."}, {"c": "Суд, закон, полиция", "de": "die Unabhängigkeit", "ru": "независимость", "en": "independence", "core": false, "note": "", "exde": "Die Unabhängigkeit der Justiz ist im Grundgesetz garantiert.", "exen": "The independence of the judiciary is guaranteed in the Basic Law."}, {"c": "Суд, закон, полиция", "de": "die Verhandlung", "ru": "судебное заседание; переговоры", "en": "court hearing; negotiation", "core": false, "note": "", "exde": "Die Verhandlung vor Gericht ist meistens öffentlich.", "exen": "The court hearing is usually public."}, {"c": "Суд, закон, полиция", "de": "die Straftat", "ru": "преступление", "en": "criminal offence", "core": false, "note": "", "exde": "Diebstahl ist eine Straftat.", "exen": "Theft is a criminal offence."}, {"c": "Суд, закон, полиция", "de": "der Täter / die Täterin", "ru": "преступник, виновник", "en": "perpetrator, offender", "core": false, "note": "", "exde": "Der Täter wurde von der Polizei festgenommen.", "exen": "The perpetrator was arrested by the police."}, {"c": "Суд, закон, полиция", "de": "das Opfer", "ru": "жертва", "en": "victim", "core": false, "note": "", "exde": "Das Opfer einer Straftat kann Hilfe vom Staat bekommen.", "exen": "The victim of a crime can receive help from the state."}, {"c": "Суд, закон, полиция", "de": "die Gewalt", "ru": "насилие; власть", "en": "violence; power", "core": false, "note": "context matters", "exde": "In einer Demokratie geht die Staatsgewalt vom Volk aus.", "exen": "In a democracy, state power comes from the people."}, {"c": "Суд, закон, полиция", "de": "die Haft", "ru": "заключение, арест", "en": "detention, imprisonment", "core": false, "note": "", "exde": "Für schwere Straftaten kann eine Haft verhängt werden.", "exen": "For serious crimes, imprisonment can be imposed."}, {"c": "Суд, закон, полиция", "de": "die Todesstrafe", "ru": "смертная казнь", "en": "death penalty", "core": false, "note": "", "exde": "Die Todesstrafe ist in Deutschland abgeschafft.", "exen": "The death penalty is abolished in Germany."}, {"c": "Суд, закон, полиция", "de": "abschaffen", "ru": "отменять, упразднять", "en": "to abolish", "core": false, "note": "", "exde": "Deutschland hat die Todesstrafe abgeschafft.", "exen": "Germany has abolished the death penalty."}, {"c": "Суд, закон, полиция", "de": "beweisen", "ru": "доказывать", "en": "to prove", "core": false, "note": "", "exde": "Vor Gericht muss man seine Aussage beweisen.", "exen": "In court you have to prove your statement."}, {"c": "Суд, закон, полиция", "de": "der Beweis", "ru": "доказательство", "en": "proof, evidence", "core": false, "note": "", "exde": "Ohne Beweis kann niemand verurteilt werden.", "exen": "Without proof no one can be convicted."}, {"c": "История Германии", "de": "die Geschichte", "ru": "история", "en": "history", "core": false, "note": "", "exde": "Die Geschichte Deutschlands im 20. Jahrhundert ist wichtig für den Test.", "exen": "Germany’s 20th-century history is important for the test."}, {"c": "История Германии", "de": "der Zweite Weltkrieg", "ru": "Вторая мировая война", "en": "World War II", "core": false, "note": "", "exde": "Der Zweite Weltkrieg endete im Jahr 1945.", "exen": "World War II ended in the year 1945."}, {"c": "История Германии", "de": "der Nationalsozialismus", "ru": "национал-социализм", "en": "National Socialism, Nazism", "core": false, "note": "", "exde": "Der Nationalsozialismus herrschte in Deutschland von 1933 bis 1945.", "exen": "National Socialism ruled in Germany from 1933 to 1945."}, {"c": "История Германии", "de": "nationalsozialistisch", "ru": "нацистский, национал-социалистический", "en": "Nazi, National Socialist", "core": false, "note": "", "exde": "Die nationalsozialistische Diktatur verfolgte viele Menschen.", "exen": "The National Socialist dictatorship persecuted many people."}, {"c": "История Германии", "de": "die NS-Zeit", "ru": "период нацизма", "en": "Nazi period", "core": false, "note": "", "exde": "In der NS-Zeit gab es keine freien Wahlen.", "exen": "During the Nazi period there were no free elections."}, {"c": "История Германии", "de": "der Holocaust", "ru": "Холокост", "en": "the Holocaust", "core": false, "note": "", "exde": "Der Holocaust war der Völkermord an den europäischen Juden.", "exen": "The Holocaust was the genocide of European Jews."}, {"c": "История Германии", "de": "die Verfolgung", "ru": "преследование", "en": "persecution", "core": false, "note": "", "exde": "Die Verfolgung der Juden begann schon vor dem Krieg.", "exen": "The persecution of the Jews began even before the war."}, {"c": "История Германии", "de": "verfolgen", "ru": "преследовать", "en": "to persecute, to pursue", "core": false, "note": "", "exde": "Die Nationalsozialisten verfolgten Juden und andere Minderheiten.", "exen": "The National Socialists persecuted Jews and other minorities."}, {"c": "История Германии", "de": "die Juden", "ru": "евреи", "en": "Jews", "core": false, "note": "", "exde": "Während des Holocaust wurden Millionen Juden ermordet.", "exen": "During the Holocaust, millions of Jews were murdered."}, {"c": "История Германии", "de": "jüdisch", "ru": "еврейский", "en": "Jewish", "core": false, "note": "", "exde": "In vielen Städten gibt es eine jüdische Gemeinde.", "exen": "In many cities there is a Jewish community."}, {"c": "История Германии", "de": "das Konzentrationslager", "ru": "концентрационный лагерь", "en": "concentration camp", "core": false, "note": "", "exde": "In den Konzentrationslagern starben viele Menschen.", "exen": "Many people died in the concentration camps."}, {"c": "История Германии", "de": "die Schuld", "ru": "вина", "en": "guilt, fault", "core": false, "note": "", "exde": "Deutschland trägt eine historische Schuld für den Holocaust.", "exen": "Germany bears a historical guilt for the Holocaust."}, {"c": "История Германии", "de": "die Wiedervereinigung", "ru": "воссоединение Германии", "en": "reunification", "core": true, "note": "", "exde": "Die Wiedervereinigung Deutschlands war am 3. Oktober 1990.", "exen": "The reunification of Germany was on 3 October 1990."}, {"c": "История Германии", "de": "die Teilung Deutschlands", "ru": "разделение Германии", "en": "division of Germany", "core": false, "note": "", "exde": "Die Teilung Deutschlands dauerte von 1949 bis 1990.", "exen": "The division of Germany lasted from 1949 to 1990."}, {"c": "История Германии", "de": "die DDR", "ru": "ГДР", "en": "GDR / East Germany", "core": true, "note": "", "exde": "Die DDR war der sozialistische Staat im Osten Deutschlands.", "exen": "The GDR was the socialist state in the east of Germany."}, {"c": "История Германии", "de": "die BRD", "ru": "ФРГ", "en": "FRG / West Germany", "core": false, "note": "", "exde": "Die BRD war der demokratische Staat im Westen Deutschlands.", "exen": "The FRG was the democratic state in the west of Germany."}, {"c": "История Германии", "de": "die Mauer", "ru": "стена", "en": "wall", "core": false, "note": "", "exde": "Die Mauer trennte Ost- und West-Berlin.", "exen": "The Wall separated East and West Berlin."}, {"c": "История Германии", "de": "der Mauerfall", "ru": "падение стены", "en": "fall of the Wall", "core": false, "note": "", "exde": "Der Mauerfall war am 9. November 1989.", "exen": "The fall of the Wall was on 9 November 1989."}, {"c": "История Германии", "de": "der Aufstand", "ru": "восстание", "en": "uprising", "core": false, "note": "", "exde": "Der Aufstand vom 17. Juni 1953 richtete sich gegen die DDR-Regierung.", "exen": "The uprising of 17 June 1953 was directed against the GDR government."}, {"c": "История Германии", "de": "die Revolution", "ru": "революция", "en": "revolution", "core": false, "note": "", "exde": "Eine Revolution kann ein politisches System verändern.", "exen": "A revolution can change a political system."}, {"c": "История Германии", "de": "die friedliche Revolution", "ru": "мирная революция", "en": "peaceful revolution", "core": false, "note": "", "exde": "Die friedliche Revolution 1989 führte zum Mauerfall.", "exen": "The peaceful revolution of 1989 led to the fall of the Wall."}, {"c": "История Германии", "de": "der Vertrag", "ru": "договор", "en": "treaty, contract", "core": false, "note": "", "exde": "Ein Vertrag ist eine verbindliche Vereinbarung.", "exen": "A treaty is a binding agreement."}, {"c": "История Германии", "de": "der Beitritt", "ru": "присоединение", "en": "accession, joining", "core": false, "note": "", "exde": "Der Beitritt der DDR zur BRD erfolgte 1990.", "exen": "The GDR’s accession to the FRG took place in 1990."}, {"c": "История Германии", "de": "gründen", "ru": "основывать", "en": "to found", "core": false, "note": "", "exde": "1949 wurde die Bundesrepublik Deutschland gegründet.", "exen": "In 1949 the Federal Republic of Germany was founded."}, {"c": "История Германии", "de": "die Gründung", "ru": "основание", "en": "founding", "core": false, "note": "", "exde": "Die Gründung der Bundesrepublik war im Jahr 1949.", "exen": "The founding of the Federal Republic was in the year 1949."}, {"c": "История Германии", "de": "besetzen", "ru": "оккупировать, занимать", "en": "to occupy", "core": false, "note": "", "exde": "Nach 1945 besetzten die Alliierten Deutschland.", "exen": "After 1945 the Allies occupied Germany."}, {"c": "История Германии", "de": "die Besatzungszone", "ru": "оккупационная зона", "en": "occupation zone", "core": false, "note": "", "exde": "Deutschland war nach dem Krieg in vier Besatzungszonen geteilt.", "exen": "After the war, Germany was divided into four occupation zones."}, {"c": "Общество и повседневная жизнь", "de": "die Gesellschaft", "ru": "общество", "en": "society", "core": false, "note": "", "exde": "Die deutsche Gesellschaft ist vielfältig und offen.", "exen": "German society is diverse and open."}, {"c": "Общество и повседневная жизнь", "de": "der Bürger / die Bürgerin", "ru": "гражданин / гражданка", "en": "citizen", "core": false, "note": "", "exde": "Jeder Bürger darf an der Wahl teilnehmen.", "exen": "Every citizen may take part in the election."}, {"c": "Общество и повседневная жизнь", "de": "die Bevölkerung", "ru": "население", "en": "population", "core": false, "note": "", "exde": "Die Bevölkerung Deutschlands beträgt etwa 84 Millionen Menschen.", "exen": "The population of Germany is about 84 million people."}, {"c": "Общество и повседневная жизнь", "de": "der Ausländer / die Ausländerin", "ru": "иностранец / иностранка", "en": "foreigner", "core": false, "note": "", "exde": "Ausländer haben in Deutschland viele Rechte und Pflichten.", "exen": "Foreigners have many rights and duties in Germany."}, {"c": "Общество и повседневная жизнь", "de": "die Integration", "ru": "интеграция", "en": "integration", "core": false, "note": "", "exde": "Ein Integrationskurs hilft bei der Integration in Deutschland.", "exen": "An integration course helps with integration in Germany."}, {"c": "Общество и повседневная жизнь", "de": "die Staatsangehörigkeit", "ru": "гражданство", "en": "citizenship, nationality", "core": true, "note": "", "exde": "Mit der Einbürgerung erhält man die deutsche Staatsangehörigkeit.", "exen": "With naturalization you obtain German citizenship."}, {"c": "Общество и повседневная жизнь", "de": "die Einbürgerung", "ru": "натурализация", "en": "naturalization", "core": true, "note": "", "exde": "Für die Einbürgerung muss man meistens den Test „Leben in Deutschland“ bestehen.", "exen": "For naturalization you usually have to pass the “Leben in Deutschland” test."}, {"c": "Общество и повседневная жизнь", "de": "der Antrag", "ru": "заявление", "en": "application", "core": false, "note": "", "exde": "Für die Einbürgerung muss man einen Antrag stellen.", "exen": "For naturalization you have to submit an application."}, {"c": "Общество и повседневная жизнь", "de": "beantragen", "ru": "подавать заявление", "en": "to apply for", "core": true, "note": "", "exde": "Man kann die deutsche Staatsangehörigkeit beim Amt beantragen.", "exen": "You can apply for German citizenship at the office."}, {"c": "Общество и повседневная жизнь", "de": "die Behörde", "ru": "ведомство, госорган", "en": "authority, government office", "core": false, "note": "", "exde": "Eine Behörde ist eine staatliche Stelle mit Aufgaben.", "exen": "An authority is a state body with tasks."}, {"c": "Общество и повседневная жизнь", "de": "das Amt", "ru": "ведомство, учреждение", "en": "office, authority", "core": false, "note": "", "exde": "Für den Pass muss man zum Amt gehen.", "exen": "For the passport you have to go to the office."}, {"c": "Общество и повседневная жизнь", "de": "das Rathaus", "ru": "ратуша", "en": "town hall, city hall", "core": false, "note": "", "exde": "Der Bürgermeister arbeitet im Rathaus.", "exen": "The mayor works in the town hall."}, ny everyone may freely choose their religion."}, {"c": "Религия и мировоззрение", "de": "der Glaube", "ru": "вера", "en": "faith, belief", "core": false, "note": "", "exde": "Der Glaube ist eine persönliche Entscheidung jedes Menschen.", "exen": "Faith is a personal decision of each person."}, {"c": "Религия и мировоззрение", "de": "glauben", "ru": "верить", "en": "to believe", "core": false, "note": "", "exde": "Jeder darf glauben, was er möchte.", "exen": "Everyone may believe what they want."}, {"c": "Религия и мировоззрение", "de": "christlich", "ru": "христианский", "en": "Christian", "core": false, "note": "", "exde": "Viele Menschen in Deutschland sind christlich.", "exen": "Many people in Germany are Christian."}, {"c": "Религия и мировоззрение", "de": "jüdisch", "ru": "еврейский", "en": "Jewish", "core": false, "note": "", "exde": "In vielen Städten gibt es eine jüdische Gemeinde.", "exen": "In many cities there is a Jewish community."}, {"c": "Религия и мировоззрение", "de": "muslimisch", "ru": "мусульманский", "en": "Muslim", "core": false, "note": "", "exde": "Auch muslimische Menschen leben in Deutschland.", "exen": "Muslim people also live in Germany."}, {"c": "Религия и мировоззрение", "de": "die Kirche", "ru": "церковь", "en": "church", "core": false, "note": "", "exde": "Christen gehen zum Gottesdienst in die Kirche.", "exen": "Christians go to the church for the service."}, {"c": "Религия и мировоззрение", "de": "die Synagoge", "ru": "синагога", "en": "synagogue", "core": false, "note": "", "exde": "Jüdische Menschen beten in der Synagoge.", "exen": "Jewish people pray in the synagogue."}, {"c": "Религия и мировоззрение", "de": "die Moschee", "ru": "мечеть", "en": "mosque", "core": false, "note": "", "exde": "Muslime beten in der Moschee.", "exen": "Muslims pray in the mosque."}, {"c": "Религия и мировоззрение", "de": "der Staat und die Religion", "ru": "государство и религия", "en": "state and religion", "core": false, "note": "", "exde": "In Deut /* ---------------- storage (window.storage → localStorage → memory) ---------------- */
const Store = (()=>{
  const mem = {};
  const hasWS = typeof window!=="undefined" && window.storage && typeof window.storage.get==="function";
  let hasLS = false;
  try{ hasLS = typeof localStorage!=="undefined"; localStorage.getItem("__t"); }catch(e){ hasLS=false; }
  return {
    async get(k){
      if(hasWS){ try{ const r=await window.storage.get(k); return r? r.value : null; }catch(e){ return null; } }
      if(hasLS){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
      return k in mem ? mem[k] : null;
    },
    async set(k,v){
      if(hasWS){ try{ await window.storage.set(k,v); return; }catch(e){} }
      if(hasLS){ try{ localStorage.setItem(k,v); return; }catch(e){} }
      mem[k]=v;
    }
  };
})();
const K_KNOWN="lid.known.v1", K_BEST="lid.best.v1", K_LANG="lid.lang.v1";

/* ---------------- state ---------------- */
const S = {
  mode:"cards", lang:"en", filter:"all",
  onlyUnknown:false,
  deck:[], idx:0, flipped:false,
  known:Object.create(null),
  quiz:{ q:null, options:[], answered:false, correct:0, total:0, streak:0, best:0 },
  hideTr:false, search:"",
  srs:Object.create(null), srsQueue:[], srsFlipped:false, srsNewCap:15,
};
const key = it => it.c + "||" + it.de;
const $ = s => document.querySelector(s);
const el = (t,c)=>{ const e=document.createElement(t); if(c) e.className=c; return e; };
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function lenClass(s){ const n=s.length; return n>34?"xlong":n>18?"long":""; }
function wireReveal(root){
  const b=root.querySelector(".reveal-ru"); if(!b) return;
  b.addEventListener("click", ev=>{
    ev.stopPropagation();
    const line=root.querySelector(".ru-line");
    if(line.hasAttribute("hidden")){ line.removeAttribute("hidden"); b.textContent="Скрыть русский"; }
    else { line.setAttribute("hidden",""); b.textContent="Показать русский"; }
  });
}

/* ---------------- pools ---------------- */
function pool(){
  let a = DATA.items;
  if(S.filter==="core") a = a.filter(x=>x.core);
  else if(S.filter!=="all") a = a.filter(x=>x.c===S.filter);
  return a;
}
function learnedCount(){ return Object.keys(S.known).length; }

/* ---------------- persistence ---------------- */
let saveT=null;
function saveKnown(){ clearTimeout(saveT); saveT=setTimeout(()=>Store.set(K_KNOWN, JSON.stringify(S.known)),120); }
function saveBest(){ Store.set(K_BEST, String(S.quiz.best)); }

/* ---------------- header ---------------- */
function updateHeader(){
  const total = DATA.total, done = learnedCount();
  $("#p-count").textContent = done;
  $("#p-total").textContent = total;
  $("#p-bar").style.width = (total? (done/total*100):0) + "%";
}

   CARDS
========================================================= */
function buildDeck(){
  let a = pool();
  if(S.onlyUnknown) a = a.filter(x=>!S.known[key(x)]);
  S.deck = shuffle(a);
  if(S.idx >= S.deck.length) S.idx = 0;
  S.flipped = false;
}
function renderCards(){
  const host = $("#cards-inner"); host.innerHTML="";
  if(!S.deck.length){
    const e = el("div","empty");
    const allDone = S.onlyUnknown && pool().length>0;
    e.innerHTML = `<div class="big">${allDone?"Всё выучено в этой подборке":"Здесь пока пусто"}</div>
      <p>${allDone?"Отличная работа. Можно повторить всё заново или выбрать другую категорию.":"Выберите другую категорию или снимите фильтр."}</p>`;
    const b = el("button","btn-primary");
    b.textContent = allDone?"Повторить всё":"Показать все";
    b.onclick = ()=>{ S.onlyUnknown=false; $("#t-unknown").setAttribute("aria-pressed","false"); buildDeck(); renderCards(); };
    e.appendChild(b); host.appendChild(e); return;
  }
  const it = S.deck[S.idx];
  const shell = el("div","card-shell");
  const card = el("div","card"+(S.flipped?" flipped":""));
  card.setAttribute("role","button"); card.setAttribute("tabindex","0");
  card.setAttribute("aria-label","Карточка. Нажмите, чтобы перевернуть.");

  const en = it.en || "—";
  const ru = it.ru || "";

  card.innerHTML = `
    <div class="face front">
      <div class="spine"></div>
      <div class="card-head">
        <div class="eyebrow">${escapeHtml(it.c)}</div>
        ${it.core?'<div class="tag-core">Важное</div>':''}
      </div>
      <div class="card-body">
        <div class="term ${lenClass(it.de)}">${escapeHtml(it.de)}</div>
      </div>
      <div class="face-foot">
        <span class="hint">Нажмите, чтобы увидеть перевод</span>
        <span class="flipmark">DE</span>
      </div>
    </div>
    <div class="face back">
      <div class="spine"></div>
      <div class="card-head">
        <div class="eyebrow">${escapeHtml(it.de)}</div>
        ${it.core?'<div class="tag-core">Важное</div>':''}
      </div>
      <div class="card-body">
        <div class="answer ${en.length>26?'long':''}">${escapeHtml(en)}</div>
        ${it.exde?`<div class="example"><span class="ex-label">Beispiel</span><span class="ex-de">${escapeHtml(it.exde)}</span>${it.exen?`<span class="ex-en">${escapeHtml(it.exen)}</span>`:''}</div>`:''}
        ${it.note?`<div class="note">${escapeHtml(it.note)}</div>`:''}
        ${ru?`<button type="button" class="reveal-ru">Показать русский</button><div class="ru-line" hidden><span class="lbl">RU</span>${escapeHtml(ru)}</div>`:''}
      </div>
      <div class="face-foot"><span class="flipmark">${S.lang.toUpperCase()}</span></div>
    </div>`;
  card.addEventListener("click", flip);
  card.addEventListener("keydown", ev=>{ if(ev.key===" "||ev.key==="Enter"){ ev.preventDefault(); flip(); } });
  wireReveal(card);
  shell.appendChild(card); host.appendChild(shell);

  // controls
  const ctr = el("div","controls");
  const prev = navBtn("‹","Предыдущая", ()=>go(-1));
  const no = el("button","judge no"); no.innerHTML="Не знаю"; no.onclick=()=>mark(false);
  const yes = el("button","judge yes"); yes.innerHTML="Знаю"; yes.onclick=()=>mark(true);
  const next = navBtn("›","Следующая", ()=>go(1));
  ctr.append(prev,no,yes,next); host.appendChild(ctr);

  const counter = el("div","counter"); counter.style.textAlign="center"; counter.style.marginTop="14px";
  counter.textContent = `${S.idx+1} / ${S.deck.length}`;
  host.appendChild(counter);

  // dots (cap for large decks)
  const dots = el("div","dots");
  const n = S.deck.length;
  if(n<=40){
    for(let i=0;i<n;i++){ const d=el("i"); const di=S.deck[i];
      if(S.known[key(di)]) d.classList.add("on"); if(i===S.idx) d.classList.add("cur"); dots.appendChild(d); }
  }
  host.appendChild(dots);

  const kb = el("div","kbd-hint");
  kb.innerHTML = `<kbd>Space</kbd> перевернуть · <kbd>←</kbd> <kbd>→</kbd> листать · <kbd>1</kbd> не знаю · <kbd>2</kbd> знаю`;
  host.appendChild(kb);
}
function navBtn(txt,label,fn){ const b=el("button","nav-btn"); b.textContent=txt; b.setAttribute("aria-label",label); b.onclick=fn; return b; }
function flip(){ S.flipped=!S.flipped; const c=$(".card"); if(c) c.classList.toggle("flipped", S.flipped); }
function go(dir){ if(!S.deck.length) return; S.idx=(S.idx+dir+S.deck.length)%S.deck.length; S.flipped=false; renderCards(); }
function mark(good){
  if(!S.deck.length) return;
  const it=S.deck[S.idx];
  if(good) S.known[key(it)]=true; else delete S.known[key(it)];
  saveKnown(); updateHeader();
  // advance; if onlyUnknown & marked known, the item drops from deck on rebuild
  if(S.onlyUnknown && good){ buildDeck(); if(S.idx>=S.deck.length) S.idx=Math.max(0,S.deck.length-1); renderCards(); }
  else go(1);
}

const HEAD_MORPHEMES=["versammlung","verwaltung","regierung","demokratie","monarchie","republik","freiheit","minister","ordnung","gericht","gewalt","partei","bürger","glaube","pflicht","kammer","gesetz","staat","recht","wahl","volk"];
const DERIV_SUFFIXES=["ismus","schaft","tion","sion","heit","keit","tät","ung","ive","ie"];
function stripArt(de){ return de.replace(/^(der|die|das)\s+/i,"").trim(); }
function leadArt(de){ const m=de.match(/^(der|die|das)\s+/i); return m?m[1].toLowerCase():""; }
function letters(s){ return s.toLowerCase().replace(/[^a-zäöüß]+/g,""); }
function headMorph(de){ const w=letters(stripArt(de)); for(const h of HEAD_MORPHEMES){ if(w.length>h.length+1 && w.endsWith(h)) return h; } return ""; }
function derivSuf(de){ const w=letters(stripArt(de)); for(const s of DERIV_SUFFIXES){ if(w.length>s.length+2 && w.endsWith(s)) return s; } return ""; }
function bigrams(s){ const g=[]; for(let i=0;i<s.length-1;i++) g.push(s.slice(i,i+2)); return g; }
function dice(a,b){ a=letters(a); b=letters(b); if(!a||!b) return 0; if(a===b) return 1; const A=bigrams(a),B=bigrams(b); if(A.length<1||B.length<1) return 0; const m=new Map(); A.forEach(x=>m.set(x,(m.get(x)||0)+1)); let inter=0; B.forEach(x=>{ const c=m.get(x)||0; if(c>0){ inter++; m.set(x,c-1);} }); return 2*inter/(A.length+B.length); }
function toks(s){ return (s||"").toLowerCase().split(/[^a-zа-яё0-9]+/).filter(w=>w.length>2); }
function jacc(a,b){ const A=new Set(toks(a)),B=new Set(toks(b)); if(!A.size||!B.size) return 0; let inter=0; A.forEach(x=>{ if(B.has(x)) inter++; }); return inter/(A.size+B.size-inter); }
function simScore(a,b,lang){
  let s=0;
  if(a.c===b.c) s+=2;
  const arA=leadArt(a.de), arB=leadArt(b.de); if(arA && arA===arB) s+=1;
  const hA=headMorph(a.de), hB=headMorph(b.de); if(hA && hA===hB) s+=4;
  const dA=derivSuf(a.de), dB=derivSuf(b.de); if(dA && dA===dB) s+=2.5;
  s+=2*dice(stripArt(a.de),stripArt(b.de));
  s+=2*jacc(a[lang],b[lang]);
  return s;
}
function distractors(correct,n){
  const seen=new Set([correct[S.lang]]);
  const scored=[];
  for(const it of DATA.items){
    if(it===correct) continue;
    const t=it[S.lang];
    if(!t||seen.has(t)) continue; seen.add(t);
    scored.push({t, s:simScore(correct,it,S.lang)});
  }
  scored.sort((a,b)=>b.s-a.s);
  const strongCount=Math.min(scored.length, Math.max(1, Math.ceil(n/2)));  // hardest 1-2 always shown
  const out=scored.slice(0,strongCount).map(x=>x.t);
  const rest=shuffle(scored.slice(strongCount, strongCount+Math.max(n,5))); // rest varied for replayability
  for(const r of rest){ if(out.length>=n) break; if(!out.includes(r.t)) out.push(r.t); }
  for(let i=0;i<scored.length && out.length<n;i++){ if(!out.includes(scored[i].t)) out.push(scored[i].t); }
  return out.slice(0,n);
}
function newQuestion(){
  const p = pool();
  const inner = $("#quiz-inner");
  if(p.length<2){ inner.innerHTML = `<div class="empty"><div class="big">Мало слов для теста</div><p>Выберите категорию побольше или «Все».</p></div>`; return; }
  let q, guard=0;
  do{ q = p[Math.floor(Math.random()*p.length)]; guard++; } while(p.length>4 && q===S.quiz.last && guard<10);
  S.quiz.last=q; S.quiz.q=q; S.quiz.answered=false;
  S.quiz.options = shuffle([q[S.lang], ...distractors(q,3)]);
  renderQuiz();
}
function renderQuiz(){
  const inner=$("#quiz-inner"); const q=S.quiz.q; if(!q) return;
  const ask = "Выберите правильный перевод";
  inner.innerHTML = `
    <div class="quiz-card">
      <div class="spine" style="border-radius:0"></div>
      <div class="eyebrow" style="margin-left:8px">${escapeHtml(q.c)}</div>
      <div class="quiz-prompt" style="margin-left:8px">
        <div class="quiz-ask">${ask}</div>
        <div class="quiz-term ${lenClass(q.de)}">${escapeHtml(q.de)}</div>
      </div>
      <div class="options" id="opts"></div>
      ${S.quiz.answered && q.exde?`<div class="example" style="margin-top:18px"><span class="ex-label">Beispiel</span><span class="ex-de">${escapeHtml(q.exde)}</span>${q.exen?`<span class="ex-en">${escapeHtml(q.exen)}</span>`:''}</div>`:''}
      <div class="quiz-foot">
        <div class="score">
          <span>Верно: <b>${S.quiz.correct}</b> / ${S.quiz.total}</span>
          <span class="streak">Серия: <b>${S.quiz.streak}</b></span>
          <span>Рекорд: <b>${S.quiz.best}</b></span>
        </div>
        <button class="btn-primary" id="q-next" ${S.quiz.answered?'':'style="display:none"'}>Дальше →</button>
      </div>
    </div>`;
  const wrap=$("#opts"); const correct=q[S.lang];
  S.quiz.options.forEach(txt=>{
    const b=el("button","opt");
    b.innerHTML = `<span>${escapeHtml(txt)}</span><span class="ic"></span>`;
    if(S.quiz.answered){
      b.disabled=true;
      if(txt===correct){ b.classList.add("correct"); b.querySelector(".ic").textContent="✓"; }
      else if(txt===S.quiz.picked){ b.classList.add("wrong"); b.querySelector(".ic").textContent="✕"; }
      else b.classList.add("dim");
    } else {
      b.onclick=()=>answer(txt);
    }
    wrap.appendChild(b);
  });
  const nx=$("#q-next"); if(nx) nx.onclick=newQuestion;
}
function answer(txt){
  if(S.quiz.answered) return;
  S.quiz.answered=true; S.quiz.picked=txt;
  const correct=S.quiz.q[S.lang];
  S.quiz.total++;
  if(txt===correct){
    S.quiz.correct++; S.quiz.streak++;
    if(S.quiz.streak>S.quiz.best){ S.quiz.best=S.quiz.streak; saveBest(); }
    S.known[key(S.quiz.q)]=true; saveKnown(); updateHeader();
  } else { S.quiz.streak=0; }
  renderQuiz();
}

  const inner=$("#list-inner"); inner.innerHTML="";

      x.de.toLowerCase().includes(term) ||

  // group by category, preserving DATA order
  const order = DATA.cats.map(c=>c.name);

  a.forEach(x=>{ (groups[x.c] = groups[x.c]||[]).push(x); });

    const g=el("div","group");
    const gh=el("div","group-head");
    gh.innerHTML = `<h3>${escapeHtml(cat)}</h3><span class="gn">${groups[cat].length}</span>`;
    g.appendChild(gh);
    groups[cat].forEach(x=>{
      const r=el("div","row"+(S.hideTr?" hide":""));
      r.innerHTML = `
        <div class="de">${escapeHtml(x.de)}${x.core?'<span class="cstar">★</span>':''}</div>
        <div class="tr">${escapeHtml(x.en||"—")}</div>
        <div class="rn">${x.exde?escapeHtml(x.exde):(x.note?escapeHtml(x.note):"")}</div>`;
      if(S.hideTr){ const t=r.querySelector(".tr"); t.onclick=()=>t.classList.toggle("revealed"); }
      g.appendChild(r);
    });
    inner.appendChild(g);

}

function setMode(m){
  S.mode=m;
  $("#tab-cards").setAttribute("aria-selected", m==="cards");
  $("#tab-srs").setAttribute("aria-selected", m==="srs");
  $("#tab-quiz").setAttribute("aria-selected", m==="quiz");
  $("#tab-list").setAttribute("aria-selected", m==="list");
  $("#view-cards").hidden = m!=="cards";
  $("#view-srs").hidden = m!=="srs";
  $("#view-quiz").hidden = m!=="quiz";
  $("#view-list").hidden = m!=="list";
  if(m==="cards"){ buildDeck(); renderCards(); }
  else if(m==="srs"){ buildSrsSession(true,false); renderSrs(); }
  else if(m==="quiz"){ newQuestion(); }
  else renderList();
}
function buildFilters(){
  const host=$("#filters"); host.innerHTML="";
  const mk=(id,label,count,extra="")=>{
    const b=el("button","chip"+(extra?(" "+extra):""));
    b.dataset.f=id;
    b.setAttribute("aria-pressed", S.filter===id);
    b.innerHTML = `${extra==="core"?'<span class="star">★</span>':''}${label}<span class="n">${count}</span>`;
    b.onclick=()=>setFilter(id);
    return b;
  };
  host.appendChild(mk("all","Все",DATA.total));
  host.appendChild(mk("core","Важное",DATA.core,"core"));
  DATA.cats.forEach(c=> host.appendChild(mk(c.name, c.name, c.count)));
}
function setFilter(f){
  S.filter=f;
  document.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed", c.dataset.f===f));
  if(S.mode==="cards"){ S.idx=0; buildDeck(); renderCards(); }
  else if(S.mode==="srs"){ buildSrsSession(true,false); renderSrs(); }
  else if(S.mode==="quiz"){ S.quiz.streak=0; newQuestion(); }
  else renderList();
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function bind(){
  $("#tab-cards").onclick=()=>setMode("cards");
  $("#tab-srs").onclick=()=>setMode("srs");
  $("#tab-quiz").onclick=()=>setMode("quiz");
  $("#tab-list").onclick=()=>setMode("list");

  $("#t-unknown").onclick=e=>{ S.onlyUnknown=!S.onlyUnknown; e.currentTarget.setAttribute("aria-pressed",S.onlyUnknown); S.idx=0; buildDeck(); renderCards(); };
  $("#t-hide").onclick=e=>{ S.hideTr=!S.hideTr; e.currentTarget.setAttribute("aria-pressed",S.hideTr); renderList(); };
  $("#search").addEventListener("input", e=>{ S.search=e.target.value; renderList(); });

  $("#reset").onclick=()=>{
    if(confirm("Сбросить весь прогресс обучения? Это действие нельзя отменить.")){
      S.known=Object.create(null); S.quiz.best=0; S.quiz.correct=0; S.quiz.total=0; S.quiz.streak=0;
      S.srs=Object.create(null); S.srsQueue=[]; S.srsFlipped=false;
      saveKnown(); saveBest(); saveSrs(); updateHeader();
      if(S.mode==="cards"){ buildDeck(); renderCards(); }
      else if(S.mode==="srs") renderSrs();
      else if(S.mode==="quiz") renderQuiz();
      else renderList();
    }
  };

  document.addEventListener("keydown", ev=>{
    const t=ev.target; if(t && (t.tagName==="INPUT"||t.tagName==="TEXTAREA")) return;
    if(S.mode==="cards"){
      if(ev.key===" "){ ev.preventDefault(); flip(); }
      else if(ev.key==="ArrowRight"){ ev.preventDefault(); go(1); }
      else if(ev.key==="ArrowLeft"){ ev.preventDefault(); go(-1); }
      else if(ev.key==="1"){ ev.preventDefault(); mark(false); }
      else if(ev.key==="2"){ ev.preventDefault(); mark(true); }
    } else if(S.mode==="srs"){
      if(!S.srsQueue.length) return;
      if(!S.srsFlipped){ if(ev.key===" "||ev.key==="Enter"){ ev.preventDefault(); S.srsFlipped=true; renderSrs(); } }
      else { const map={"1":"again","2":"hard","3":"good","4":"easy"}; if(map[ev.key]){ ev.preventDefault(); gradeSrs(map[ev.key]); } }
    }
  });
}

/* =========================================================
   SRS — интервальное повторение (закрепление)
========================================================= */
const LEARN_STEPS_MIN=[1,10];
const GRAD_IVL_DAYS={1:1,2:3,3:7,4:16,5:35};
const MASTERED_BOX=5;
const MIN=60000, HR=3600000, DAY=86400000;
const K_SRS="lid.srs.v1";
const ITEM_MAP=new Map(DATA.items.map(it=>[key(it),it]));

function srsNewRec(){ return {phase:"learning",step:0,box:0,reps:0,lapses:0,due:Date.now()}; }
function saveSrs(){ clearTimeout(saveSrs._t); saveSrs._t=setTimeout(()=>Store.set(K_SRS,JSON.stringify(S.srs)),150); }

// Pure scheduler: returns a new record (does not mutate) — used both for the
// interval previews on the buttons and for committing an answer.
function computeSchedule(rec,grade,now){
  const r=Object.assign({},rec);
  if(r.phase!=="review"){
    r.phase=r.phase||"learning"; if(r.box==null) r.box=0; if(r.step==null) r.step=0;
    if(grade==="again"){ r.step=0; r.due=now+1*MIN; }
    else if(grade==="hard"){ r.due=now+Math.max(6,(LEARN_STEPS_MIN[r.step]||1))*MIN; }
    else if(grade==="good"){
      const ns=(r.step||0)+1;
      if(ns>=LEARN_STEPS_MIN.length){ r.phase="review"; r.box=1; r.step=0; r.due=now+GRAD_IVL_DAYS[1]*DAY; }
      else { r.step=ns; r.due=now+LEARN_STEPS_MIN[ns]*MIN; }
    } else { r.phase="review"; r.box=2; r.step=0; r.due=now+GRAD_IVL_DAYS[2]*DAY; }
  } else {
    const b=Math.min(MASTERED_BOX,r.box||1);
    if(grade==="again"){ r.phase="learning"; r.step=0; r.box=1; r.lapses=(r.lapses||0)+1; r.due=now+1*MIN; }
    else if(grade==="hard"){ r.box=b; r.due=now+Math.max(1,Math.round(GRAD_IVL_DAYS[b]*0.7))*DAY; }
    else if(grade==="good"){ r.box=Math.min(MASTERED_BOX,b+1); r.due=now+GRAD_IVL_DAYS[r.box]*DAY; }
    else { r.box=Math.min(MASTERED_BOX,b+2); r.due=now+Math.round(GRAD_IVL_DAYS[r.box]*1.3)*DAY; }
  }
  r.reps=(r.reps||0)+1;
  r.soon=(r.due-now)<11*MIN; // stays in the current session and recurs
  return r;
}
function fmtDelta(ms){
  if(ms<1*MIN) return "<1 мин";
  if(ms<HR) return Math.round(ms/MIN)+" мин";
  if(ms<DAY) return Math.round(ms/HR)+" ч";
  const d=Math.round(ms/DAY);
  if(d<14) return d+" дн";
  return Math.round(d/7)+" нед";
}
function srsStats(){
  const now=Date.now(), p=pool();
  let neu=0,learning=0,young=0,mastered=0,due=0;
  p.forEach(it=>{ const r=S.srs[key(it)];
    if(!r){ neu++; return; }
    if(r.due<=now) due++;
    if(r.phase!=="review") learning++;
    else if((r.box||1)>=MASTERED_BOX) mastered++;
    else young++;
  });
  return {total:p.length,neu,learning,young,mastered,due};
}
function nextDueDelta(){
  const now=Date.now(), p=pool(); let m=Infinity;
  p.forEach(it=>{ const r=S.srs[key(it)]; if(r&&r.due>now) m=Math.min(m,r.due-now); });
  return isFinite(m)?m:null;
}
function buildSrsSession(includeNew=true, early=false){
  const now=Date.now(), p=pool(), due=[], neu=[];
  p.forEach(it=>{ const k=key(it), r=S.srs[k];
    if(r){ if(r.due<=now) due.push({k,d:r.due}); } else neu.push(k);
  });
  due.sort((a,b)=>a.d-b.d);
  let q=due.map(x=>x.k);
  if(includeNew) q=q.concat(shuffle(neu).slice(0,S.srsNewCap));
  if(early && q.length===0){
    q=p.map(it=>({k:key(it),r:S.srs[key(it)]})).filter(x=>x.r).sort((a,b)=>a.r.due-b.r.due).slice(0,10).map(x=>x.k);
  }
  S.srsQueue=q; S.srsFlipped=false;
}
function renderSrs(){
  const host=$("#srs-inner"); host.innerHTML="";
  const st=srsStats();

  const intro=el("div","srs-intro");
  intro.textContent="Интервальное повторение: слово возвращается через растущие промежутки — чем увереннее ответ, тем позже следующий показ. Так оно закрепляется в долговременной памяти.";
  host.appendChild(intro);

  const stats=el("div","srs-stats");
  stats.innerHTML=`
    <div class="stat due"><b>${st.due}</b><span>к повторению</span></div>
    <div class="stat"><b>${st.neu}</b><span>новые</span></div>
    <div class="stat"><b>${st.learning}</b><span>на изучении</span></div>
    <div class="stat"><b>${st.mastered}</b><span>закреплено</span></div>`;
  host.appendChild(stats);

  const tot=Math.max(1,st.total);
  const bar=el("div","mbar");
  const seg=(color,n)=>{ const i=el("i"); i.style.background=color; i.style.width=(n/tot*100)+"%"; return i; };
  bar.append(seg("var(--gold)",st.mastered),seg("var(--good)",st.young),seg("#d98b2b",st.learning),seg("transparent",st.neu));
  host.appendChild(bar);
  const leg=el("div","mbar-legend");
  leg.innerHTML=`<span><i style="background:var(--gold)"></i>закреплено ${st.mastered}</span>
    <span><i style="background:var(--good)"></i>повторяется ${st.young}</span>
    <span><i style="background:#d98b2b"></i>на изучении ${st.learning}</span>
    <span><i style="background:var(--line-strong)"></i>новые ${st.neu}</span>`;
  host.appendChild(leg);

  if(!S.srsQueue.length){
    const e=el("div","empty");
    const nd=nextDueDelta(), hasNew=st.neu>0;
    e.innerHTML=`<div class="big">Всё повторено</div>
      <p>${nd!=null?("Ближайшее повторение — через "+fmtDelta(nd)+"."):"На сегодня всё."}${hasNew?" Можно взять новые слова.":""}</p>`;
    if(hasNew){ const b=el("button","btn-primary"); b.textContent="Учить новые"; b.onclick=()=>{ buildSrsSession(true,false); renderSrs(); }; e.appendChild(b); }
    const b2=el("button","toggle"); b2.style.marginLeft="8px"; b2.textContent="Повторить досрочно";
    b2.onclick=()=>{ buildSrsSession(false,true); renderSrs(); }; e.appendChild(b2);
    host.appendChild(e); return;
  }

  const it=ITEM_MAP.get(S.srsQueue[0]);
  const rec=S.srs[key(it)]||srsNewRec();
  const now=Date.now();
  const en=it.en||"—", ru=it.ru||"";

  const card=el("div","srs-card");
  card.innerHTML=`<div class="spine"></div>
    <div class="eyebrow" style="margin-left:6px">${escapeHtml(it.c)}${it.core?' · Важное':''}</div>
    <div class="srs-term ${lenClass(it.de)}">${escapeHtml(it.de)}</div>
    ${S.srsFlipped?`
      <div class="srs-answer">
        <div class="srs-tr">${escapeHtml(en)}</div>
        ${it.exde?`<div class="example"><span class="ex-label">Beispiel</span><span class="ex-de">${escapeHtml(it.exde)}</span>${it.exen?`<span class="ex-en">${escapeHtml(it.exen)}</span>`:''}</div>`:''}
        ${it.note?`<div class="srs-note">${escapeHtml(it.note)}</div>`:''}
        ${ru?`<button type="button" class="reveal-ru">Показать русский</button><div class="ru-line" hidden><span class="lbl">RU</span>${escapeHtml(ru)}</div>`:''}
      </div>`:`<div class="srs-reveal-hint">Нажмите, чтобы увидеть ответ и оценить</div>`}`;
  if(!S.srsFlipped){ card.onclick=()=>{ S.srsFlipped=true; renderSrs(); }; }
  host.appendChild(card);
  wireReveal(card);

  if(S.srsFlipped){
    const grades=el("div","grades");
    const mk=(g,label,cls)=>{
      const pr=computeSchedule(rec,g,now);
      const b=el("button","grade "+cls);
      b.innerHTML=`<span class="g-lbl">${label}</span><span class="g-ivl">${fmtDelta(pr.due-now)}</span>`;
      b.onclick=()=>gradeSrs(g); return b;
    };
    grades.append(mk("again","Снова","again"),mk("hard","Трудно","hard"),mk("good","Хорошо","good"),mk("easy","Легко","easy"));
    host.appendChild(grades);
    const kb=el("div","srs-kbd"); kb.innerHTML=`<kbd>1</kbd> снова · <kbd>2</kbd> трудно · <kbd>3</kbd> хорошо · <kbd>4</kbd> легко`;
    host.appendChild(kb);
  } else {
    const kb=el("div","srs-kbd"); kb.innerHTML=`<kbd>Space</kbd> показать ответ`; host.appendChild(kb);
  }

  const foot=el("div","srs-foot");
  foot.innerHTML=`<span>Осталось в сессии: ${S.srsQueue.length}</span><span>${it.core?'★ важное':''}</span>`;
  host.appendChild(foot);
}
function gradeSrs(g){
  if(!S.srsQueue.length) return;
  const it=ITEM_MAP.get(S.srsQueue[0]), k=key(it);
  const prev=S.srs[k]||srsNewRec(), wasReview=prev.phase==="review", now=Date.now();
  const nr=computeSchedule(prev,g,now);
  S.srs[k]=nr;
  if(nr.phase==="review" && g!=="again") S.known[k]=true;
  if(g==="again" && wasReview) delete S.known[k];
  saveKnown(); saveSrs(); updateHeader();
  S.srsQueue.shift();
  if(nr.soon){ const pos=Math.min(S.srsQueue.length,4); S.srsQueue.splice(pos,0,k); }
  S.srsFlipped=false;
  renderSrs();
}

/* ---------------- init ---------------- */
async function init(){
  $("#p-total").textContent = DATA.total;
  $("#f-total").textContent = DATA.total;
  $("#f-cats").textContent = DATA.cats.length;

  try{ const k=await Store.get(K_KNOWN); if(k){ const o=JSON.parse(k); if(o&&typeof o==="object") S.known=Object.assign(Object.create(null),o); } }catch(e){}
  try{ const s=await Store.get(K_SRS); if(s){ const o=JSON.parse(s); if(o&&typeof o==="object") S.srs=Object.assign(Object.create(null),o); } }catch(e){}
  try{ const b=await Store.get(K_BEST); if(b) S.quiz.best=parseInt(b,10)||0; }catch(e){}

  buildFilters();
  bind();
  updateHeader();
  setMode("cards");
}
init();
</script>
